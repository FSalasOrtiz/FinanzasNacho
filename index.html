<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Finanzas</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Finanzas" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230a0a0f'/%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%236ee7b7'/%3E%3Cstop offset='1' stop-color='%233b82f6'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='50' cy='50' r='32' fill='url(%23g)'/%3E%3Ctext x='50' y='62' text-anchor='middle' font-size='32' fill='white'%3E%E2%82%BF%3C/text%3E%3C/svg%3E" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { height: 100%; overflow: hidden; }
    body { font-family: 'DM Sans', sans-serif; background: #0a0a0f; color: #f0f0f5; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
    input, select, button { font-family: inherit; outline: none; border: none; -webkit-appearance: none; }
    button { cursor: pointer; }
    ::-webkit-scrollbar { display: none; }

    #header { flex-shrink:0; display:flex; align-items:center; justify-content:space-between; padding:12px 18px; background:rgba(10,10,15,.96); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); border-bottom:1px solid #1a1a2a; z-index:50; }
    .logo { display:flex; align-items:center; gap:9px; }
    .logo-icon { width:32px; height:32px; border-radius:9px; background:linear-gradient(135deg,#6ee7b7,#3b82f6); display:flex; align-items:center; justify-content:center; font-size:17px; font-weight:700; color:#fff; }
    .logo-text { font-weight:700; font-size:17px; letter-spacing:-.03em; }
    #month-input { background:#16161e; border:1px solid #2a2a3a; color:#aaa; border-radius:8px; padding:6px 10px; font-size:12px; font-family:'DM Mono',monospace; }

    #content { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:16px 16px 24px; }

    #nav { flex-shrink:0; display:flex; background:rgba(14,14,20,.98); border-top:1px solid #1a1a2a; padding-bottom:calc(env(safe-area-inset-bottom) + 4px); }
    .nav-btn { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; padding:8px 2px; background:none; color:#555; font-size:9px; letter-spacing:.03em; font-weight:600; transition:color .15s; }
    .nav-btn.active { color:#a78bfa; }
    .nav-btn svg { width:20px; height:20px; }
    .nav-add-btn { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; padding:6px 2px; background:none; }
    .nav-add-inner { width:42px; height:42px; border-radius:13px; background:linear-gradient(135deg,#a78bfa,#6366f1); display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:300; color:#fff; box-shadow:0 4px 18px rgba(99,102,241,.4); transition:transform .15s; }
    .nav-add-btn:active .nav-add-inner { transform:scale(.92); }

    .card { background:#16161e; border:1px solid #2a2a3a; border-radius:16px; padding:20px; margin-bottom:14px; animation:slideUp .3s cubic-bezier(.22,1,.36,1) both; }
    @keyframes slideUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:none; } }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    @keyframes toastIn { from { opacity:0; transform:translateY(10px) scale(.95); } to { opacity:1; transform:none; } }
    .section-label { font-size:11px; color:#555; letter-spacing:.08em; text-transform:uppercase; margin-bottom:12px; font-weight:600; }

    #balance-card { border-radius:18px; padding:22px; margin-bottom:14px; position:relative; overflow:hidden; animation:slideUp .3s cubic-bezier(.22,1,.36,1) both; }
    #balance-card .glow { position:absolute; top:-30px; right:-30px; width:140px; height:140px; border-radius:50%; pointer-events:none; }
    #balance-label { font-size:11px; color:#666; letter-spacing:.08em; text-transform:uppercase; margin-bottom:6px; }
    #balance-amount { font-family:'DM Mono',monospace; font-size:34px; font-weight:700; letter-spacing:-.04em; margin-bottom:16px; }
    .balance-row { display:flex; gap:16px; }
    .balance-stat { flex:1; }
    .balance-stat-label { font-size:10px; letter-spacing:.07em; margin-bottom:3px; font-weight:600; }
    .balance-stat-val { font-family:'DM Mono',monospace; font-size:14px; font-weight:500; }

    .dist-bar-track { height:8px; border-radius:8px; background:#1e1e2e; overflow:hidden; display:flex; margin-bottom:8px; }
    .dist-bar-in { background:linear-gradient(90deg,#34d399,#4ade80); transition:width .6s ease; }
    .dist-bar-out { flex:1; background:linear-gradient(90deg,#f87171,#ef4444); }
    .dist-labels { display:flex; justify-content:space-between; font-size:12px; }

    .cat-row { margin-bottom:12px; }
    .cat-row-top { display:flex; justify-content:space-between; font-size:13px; margin-bottom:4px; }
    .cat-bar-track { height:5px; border-radius:5px; background:#1e1e2e; }
    .cat-bar-fill { height:100%; border-radius:5px; background:linear-gradient(90deg,#6366f1,#a78bfa); transition:width .5s ease; }

    .tx-row { display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid #1a1a2a; }
    .tx-row:last-child { border-bottom:none; }
    .tx-icon { width:40px; height:40px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:19px; flex-shrink:0; }
    .tx-info { flex:1; min-width:0; }
    .tx-desc { font-weight:500; font-size:14px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .tx-sub { font-size:12px; color:#555; margin-top:2px; }
    .tx-amount { font-family:'DM Mono',monospace; font-weight:600; font-size:15px; flex-shrink:0; }
    .tx-del { background:none; color:#333; font-size:18px; padding:4px 4px 4px 8px; }

    .form-label { font-size:11px; color:#666; letter-spacing:.06em; text-transform:uppercase; display:block; margin-bottom:8px; font-weight:600; }
    .form-input { width:100%; background:#0a0a0f; border:1px solid #2a2a3a; border-radius:12px; padding:13px 14px; color:#f0f0f5; font-size:16px; font-family:'DM Sans',sans-serif; }
    .form-input:focus { border-color:#4c3d9a; }
    .type-toggle { display:flex; background:#0a0a0f; border-radius:12px; padding:4px; border:1px solid #1e1e2e; margin-bottom:20px; }
    .type-btn { flex:1; padding:11px; border-radius:9px; font-weight:700; font-size:15px; transition:all .2s; background:transparent; color:#555; }
    .type-btn.active-in { background:rgba(74,222,128,.15); color:#4ade80; border:1px solid #1a5c35; }
    .type-btn.active-out { background:rgba(248,113,113,.15); color:#f87171; border:1px solid #5c1a1a; }
    .cats-wrap { display:flex; flex-wrap:wrap; gap:8px; }
    .cat-btn { padding:8px 13px; border-radius:9px; font-size:13px; font-weight:500; background:#0a0a0f; color:#555; border:1px solid #1a1a2a; transition:all .15s; }
    .cat-btn.selected { background:#1e1e3a; color:#a78bfa; border-color:#4c3d9a; }
    .submit-btn { width:100%; padding:16px; border-radius:14px; font-weight:700; font-size:17px; color:#fff; letter-spacing:-.01em; box-shadow:0 8px 24px rgba(0,0,0,.4); transition:transform .1s; }
    .submit-btn:active { transform:scale(.97); }

    .hist-card { background:#16161e; border:1px solid #2a2a3a; border-radius:14px; padding:14px 16px; margin-bottom:10px; display:flex; align-items:center; gap:12px; animation:slideUp .25s cubic-bezier(.22,1,.36,1) both; }

    /* SAVINGS */
    .goal-card { background:#16161e; border:1px solid #2a2a3a; border-radius:16px; padding:18px; margin-bottom:12px; animation:slideUp .3s cubic-bezier(.22,1,.36,1) both; }
    .goal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
    .goal-name { font-weight:700; font-size:15px; }
    .goal-progress-track { height:8px; border-radius:8px; background:#1e1e2e; margin-bottom:8px; overflow:hidden; }
    .goal-progress-fill { height:100%; border-radius:8px; transition:width .6s cubic-bezier(.22,1,.36,1); }
    .goal-amounts { display:flex; justify-content:space-between; font-size:12px; color:#666; margin-bottom:10px; }
    .goal-amount-val { font-family:'DM Mono',monospace; font-size:13px; }
    .goal-actions { display:flex; gap:8px; }
    .goal-btn { flex:1; padding:8px; border-radius:9px; font-size:13px; font-weight:600; background:#1e1e2e; color:#a78bfa; border:1px solid #2a2a3a; transition:all .15s; }
    .goal-btn:active { transform:scale(.96); }
    .goal-del-btn { padding:8px 12px; border-radius:9px; font-size:13px; background:#1e1e2e; color:#555; border:1px solid #2a2a3a; }

    /* DEBTS */
    .debt-card { border-radius:16px; padding:16px; margin-bottom:12px; animation:slideUp .3s cubic-bezier(.22,1,.36,1) both; display:flex; align-items:center; gap:14px; }
    .debt-check { width:28px; height:28px; border-radius:50%; border:2px solid #333; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all .2s; font-size:14px; }
    .debt-check.paid { background:#1a4030; border-color:#4ade80; }
    .debt-info { flex:1; min-width:0; }
    .debt-name { font-weight:600; font-size:15px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .debt-sub { font-size:12px; color:#555; margin-top:3px; }
    .debt-right { text-align:right; flex-shrink:0; }
    .debt-amount { font-family:'DM Mono',monospace; font-weight:700; font-size:16px; }
    .debt-due { font-size:11px; margin-top:3px; }

    /* DEBT SUMMARY BAR */
    .debt-summary { display:flex; gap:10px; margin-bottom:14px; }
    .debt-stat { flex:1; background:#16161e; border:1px solid #2a2a3a; border-radius:14px; padding:14px; text-align:center; animation:slideUp .3s cubic-bezier(.22,1,.36,1) both; }
    .debt-stat-label { font-size:10px; color:#555; letter-spacing:.06em; text-transform:uppercase; margin-bottom:5px; font-weight:600; }
    .debt-stat-val { font-family:'DM Mono',monospace; font-size:17px; font-weight:700; }

    /* FORECAST */
    .forecast-bar-wrap { display:flex; align-items:flex-end; gap:6px; height:80px; margin:12px 0 6px; }
    .forecast-bar-col { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; }
    .forecast-bar { width:100%; border-radius:6px 6px 2px 2px; min-height:4px; transition:height .5s ease; }
    .forecast-bar-label { font-size:9px; color:#555; letter-spacing:.04em; text-align:center; }
    .forecast-bar-val { font-size:10px; font-family:'DM Mono',monospace; color:#888; text-align:center; }

    #modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.72); z-index:200; align-items:center; justify-content:center; animation:fadeIn .2s; }
    #modal-overlay.show { display:flex; }
    #modal-box { background:#16161e; border:1px solid #2a2a3a; border-radius:18px; padding:24px 20px; max-width:320px; width:92%; max-height:88dvh; overflow-y:auto; }
    .modal-title { font-size:17px; font-weight:700; margin-bottom:16px; }
    .modal-row { margin-bottom:14px; }
    .modal-btns { display:flex; gap:10px; margin-top:20px; }
    .modal-cancel { flex:1; padding:11px; border-radius:10px; background:#222; color:#888; font-size:15px; }
    .modal-confirm { flex:1; padding:11px; border-radius:10px; font-size:15px; font-weight:700; color:#fff; }
    .modal-confirm.danger { background:#7f2020; }
    .modal-confirm.primary { background:linear-gradient(135deg,#6366f1,#a78bfa); }

    #toast { display:none; position:fixed; bottom:calc(80px + env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%); padding:10px 20px; border-radius:10px; font-size:14px; font-weight:500; box-shadow:0 8px 28px rgba(0,0,0,.5); z-index:300; white-space:nowrap; animation:toastIn .3s ease; }
    #toast.show { display:block; }
    #toast.ok { background:#0d2d1a; border:1px solid #1a5c35; color:#4ade80; }
    #toast.err { background:#3d1414; border:1px solid #7f2020; color:#ff8080; }

    .empty { text-align:center; padding:36px 20px; color:#444; }
    .empty-icon { font-size:40px; margin-bottom:12px; }
    .insight { display:flex; align-items:flex-start; gap:10px; background:#0f1a2a; border:1px solid #1a3050; border-radius:12px; padding:13px 14px; margin-bottom:10px; }
    .insight-icon { font-size:20px; flex-shrink:0; margin-top:1px; }
    .insight-text { font-size:13px; color:#8ab4d4; line-height:1.5; }
    .insight-text strong { color:#b8d4f0; }

    /* TICKER */
    #ticker-wrap { flex-shrink:0; overflow:hidden; background:#0f0a1a; border-bottom:1px solid #2a1a4a; height:0; transition:height .3s ease; display:flex; align-items:center; }
    #ticker-wrap.visible { height:28px; }
    #ticker-wrap.urgent { background:#1a0808; border-bottom-color:#4a1a1a; }
    #ticker-track { display:flex; white-space:nowrap; animation:tickerScroll 28s linear infinite; will-change:transform; }
    #ticker-track:hover { animation-play-state:paused; }
    @keyframes tickerScroll { 0% { transform:translateX(0); } 100% { transform:translateX(-50%); } }
    .ticker-item { display:inline-flex; align-items:center; gap:6px; padding:0 28px; font-size:11px; font-weight:600; letter-spacing:.03em; }
    .ticker-dot { width:5px; height:5px; border-radius:50%; flex-shrink:0; }
    .ticker-sep { color:#333; padding:0 8px; font-size:14px; }
    #ticker-bell { flex-shrink:0; padding:0 10px; font-size:14px; cursor:pointer; border-left:1px solid #2a1a4a; height:100%; display:flex; align-items:center; background:none; transition:background .15s; }
    #ticker-bell:hover { background:rgba(255,255,255,.05); }
    #ticker-bell.on { color:#a78bfa; }
    #ticker-bell.off { color:#444; }

    /* DATA MANAGEMENT */
    #data-panel { flex-shrink:0; display:none; background:#0f0f18; border-top:1px solid #1a1a2a; padding:10px 16px; gap:8px; flex-wrap:wrap; }
    #data-panel.show { display:flex; }
    .data-btn { flex:1; min-width:120px; display:flex; align-items:center; justify-content:center; gap:6px; padding:9px 12px; border-radius:10px; font-size:12px; font-weight:700; letter-spacing:.02em; transition:all .15s; }
    .data-btn:active { transform:scale(.96); }
    .data-btn-export { background:rgba(99,102,241,.15); color:#a78bfa; border:1px solid #3a3a6a; }
    .data-btn-import { background:rgba(56,189,248,.12); color:#38bdf8; border:1px solid #1a3a5a; }
    .data-btn-backup { background:rgba(74,222,128,.1); color:#4ade80; border:1px solid #1a4030; }
    .data-btn-danger { background:rgba(248,113,113,.1); color:#f87171; border:1px solid #5c1a1a; }
    #file-import-input { display:none; }
    .header-data-btn { background:none; color:#555; font-size:18px; padding:4px 6px; border-radius:7px; transition:color .15s; }
    .header-data-btn.active { color:#a78bfa; }
  </style>
</head>
<body>

<div id="header">
  <div class="logo">
    <div class="logo-icon">₿</div>
    <span class="logo-text">Finanzas</span>
  </div>
  <input type="month" id="month-input" />
  <button class="header-data-btn" id="header-data-toggle" onclick="toggleDataPanel()" title="Importar / Exportar datos">⚙️</button>
</div>

<!-- TICKER -->
<div id="ticker-wrap">
  <div id="ticker-track"></div>
  <button id="ticker-bell" onclick="toggleReminder()" title="Activar/desactivar recordatorio diario">🔔</button>
</div>

<!-- DATA MANAGEMENT PANEL -->
<div id="data-panel">
  <button class="data-btn data-btn-export" onclick="exportExcel()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Exportar Excel
  </button>
  <button class="data-btn data-btn-import" onclick="document.getElementById('file-import-input').click()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    Importar Excel
  </button>
  <button class="data-btn data-btn-backup" onclick="exportJSON()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    Backup JSON
  </button>
  <button class="data-btn data-btn-danger" onclick="confirmClearData()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
    Borrar todo
  </button>
</div>
<input type="file" id="file-import-input" accept=".xlsx,.xls,.json" onchange="handleImportFile(event)" />

<div id="content"></div>

<nav id="nav">
  <button class="nav-btn active" id="nav-dashboard" onclick="setView('dashboard')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    Inicio
  </button>
  <button class="nav-btn" id="nav-debts" onclick="setView('debts')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>
    Deudas
  </button>
  <button class="nav-add-btn" onclick="setView('add')">
    <div class="nav-add-inner">+</div>
  </button>
  <button class="nav-btn" id="nav-savings" onclick="setView('savings')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C8 2 4 5 4 9c0 2.4 1.2 4.5 3 5.7V17a1 1 0 001 1h8a1 1 0 001-1v-2.3c1.8-1.2 3-3.3 3-5.7 0-4-4-7-8-7z"/><path d="M9 21h6"/></svg>
    Ahorro
  </button>
  <button class="nav-btn" id="nav-history" onclick="setView('history')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="9"/></svg>
    Historial
  </button>
</nav>

<div id="modal-overlay" onclick="closeModal()">
  <div id="modal-box" onclick="event.stopPropagation()">
    <div class="modal-title" id="modal-title"></div>
    <div id="modal-body"></div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">Cancelar</button>
      <button class="modal-confirm" id="modal-confirm-btn" onclick="modalConfirm()">Confirmar</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const CATS = {
  ingreso: ["Salario","Freelance","Inversiones","Alquiler","Regalo","Otro ingreso"],
  gasto:   ["Alimentación","Transporte","Vivienda","Salud","Entretenimiento","Ropa","Educación","Servicios","Otro gasto"]
};
const ICONS = {
  Salario:"💼",Freelance:"💻",Inversiones:"📈",Alquiler:"🏠",Regalo:"🎁","Otro ingreso":"💰",
  Alimentación:"🍽️",Transporte:"🚗",Vivienda:"🏡",Salud:"❤️",Entretenimiento:"🎬",
  Ropa:"👗",Educación:"📚",Servicios:"💡","Otro gasto":"📦"
};
const GOAL_EMOJIS = ["🏖️","🚗","🏠","💻","✈️","🎓","💍","🏋️","🐶","🎸","📱","🛋️","💰","🎯"];

function load(k,def){ try{ return JSON.parse(localStorage.getItem(k)||"null")??def; }catch{ return def; } }
function save(k,v){ localStorage.setItem(k,JSON.stringify(v)); }

let transactions = load("fin_tx",[]);
let goals        = load("fin_goals",[]);
// debt: {id, name, total, paid, vencimiento, categoria, pagos:[{date,amount}]}
let debts        = load("fin_debts",[]);

let currentView = "dashboard";
let form = { tipo:"gasto", descripcion:"", monto:"", categoria:"Alimentación", fecha:todayStr() };
let modalAction = null, modalData = {};

function todayStr(){ return new Date().toISOString().slice(0,10); }
function thisMonth(){ return new Date().toISOString().slice(0,7); }
function fmt(n){ return new Intl.NumberFormat("es-MX",{style:"currency",currency:"MXN",minimumFractionDigits:0,maximumFractionDigits:0}).format(n); }
function fmtShort(n){ return Math.abs(n)>=1000?"$"+(n/1000).toFixed(1)+"k":"$"+Math.round(n); }
function fmtDate(d){ return new Date(d+"T12:00:00").toLocaleDateString("es-MX",{day:"2-digit",month:"short",year:"numeric"}); }
function monthLabel(o){ const d=new Date(); d.setMonth(d.getMonth()+o); return d.toLocaleDateString("es-MX",{month:"short"}).toUpperCase(); }

const monthInput = document.getElementById("month-input");
monthInput.value = thisMonth();
monthInput.addEventListener("change",()=>render());

// TOAST
let toastTimer;
function showToast(msg,type="ok"){
  const t=document.getElementById("toast");
  t.textContent=msg; t.className=`show ${type}`;
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{ t.className=""; },2800);
}

// MODAL
function openModal(title,bodyHtml,confirmLabel,confirmClass,action,data){
  modalAction=action; modalData=data||{};
  document.getElementById("modal-title").textContent=title;
  document.getElementById("modal-body").innerHTML=bodyHtml;
  const cb=document.getElementById("modal-confirm-btn");
  cb.textContent=confirmLabel; cb.className="modal-confirm "+(confirmClass||"primary");
  document.getElementById("modal-overlay").classList.add("show");
}
function closeModal(){ modalAction=null; modalData={}; document.getElementById("modal-overlay").classList.remove("show"); }

function modalConfirm(){
  if(modalAction==="deleteGoal"){
    goals=goals.filter(g=>g.id!==modalData.id); save("fin_goals",goals);
    showToast("Meta eliminada","err"); closeModal(); render();
  } else if(modalAction==="deleteTx"){
    transactions=transactions.filter(t=>t.id!==modalData.id); save("fin_tx",transactions);
    showToast("Transacción eliminada","err"); closeModal(); render();
  } else if(modalAction==="deleteDebt"){
    debts=debts.filter(d=>d.id!==modalData.id); save("fin_debts",debts);
    showToast("Deuda eliminada","err"); closeModal(); render(); renderTicker();
  } else if(modalAction==="addGoal"){
    const name=document.getElementById("mg-name")?.value.trim();
    const target=parseFloat(document.getElementById("mg-target")?.value);
    const emoji=modalData.emoji||"💰";
    if(!name||isNaN(target)||target<=0){ showToast("Completa todos los campos","err"); return; }
    goals.push({id:Date.now(),name,emoji,target,saved:0,deposits:[]});
    save("fin_goals",goals); showToast("Meta creada ✓"); closeModal(); render();
  } else if(modalAction==="deposit"){
    const amount=parseFloat(document.getElementById("mg-deposit")?.value);
    if(isNaN(amount)||amount<=0){ showToast("Monto inválido","err"); return; }
    const g=goals.find(g=>g.id===modalData.id);
    if(g){ g.saved=(g.saved||0)+amount; g.deposits=g.deposits||[]; g.deposits.push({date:todayStr(),amount}); if(g.saved>=g.target) showToast("🎉 ¡Meta alcanzada!"); else showToast(`Depósito de ${fmt(amount)} registrado ✓`); }
    save("fin_goals",goals); closeModal(); render();
  } else if(modalAction==="withdraw"){
    const amount=parseFloat(document.getElementById("mg-deposit")?.value);
    const g=goals.find(g=>g.id===modalData.id);
    if(isNaN(amount)||amount<=0||amount>(g?.saved||0)){ showToast("Monto inválido","err"); return; }
    if(g){ g.saved-=amount; g.deposits.push({date:todayStr(),amount:-amount}); }
    save("fin_goals",goals); showToast("Retiro registrado"); closeModal(); render();
  } else if(modalAction==="addDebt"){
    const name=document.getElementById("d-name")?.value.trim();
    const total=parseFloat(document.getElementById("d-total")?.value);
    const venc=document.getElementById("d-venc")?.value||"";
    const cat=document.getElementById("d-cat")?.value||"General";
    if(!name||isNaN(total)||total<=0){ showToast("Completa nombre y monto","err"); return; }
    debts.push({id:Date.now(),name,total,paid:0,vencimiento:venc,categoria:cat,pagos:[]});
    save("fin_debts",debts); showToast("Deuda agregada ✓"); closeModal(); render(); renderTicker();
  } else if(modalAction==="payDebt"){
    const amount=parseFloat(document.getElementById("d-pay")?.value);
    const d=debts.find(d=>d.id===modalData.id);
    const remaining=d ? d.total-d.paid : 0;
    if(isNaN(amount)||amount<=0||amount>remaining+0.01){ showToast("Monto inválido","err"); return; }
    if(d){ d.paid=Math.min(d.paid+amount, d.total); d.pagos=d.pagos||[]; d.pagos.push({date:todayStr(),amount}); if(d.paid>=d.total) showToast("✅ ¡Deuda pagada por completo!"); else showToast(`Pago de ${fmt(amount)} registrado ✓`); }
    save("fin_debts",debts); closeModal(); render(); renderTicker();
  } else if(modalAction==="_importData"){
    const d = modalData.importData;
    transactions = d.transactions||[]; debts = d.debts||[]; goals = d.goals||[];
    save("fin_tx",transactions); save("fin_debts",debts); save("fin_goals",goals);
    closeModal(); render(); renderTicker();
    showToast(`✅ Importado: ${transactions.length} tx, ${debts.length} deudas, ${goals.length} metas`);
  } else if(modalAction==="_clearAll"){
    transactions=[]; debts=[]; goals=[];
    save("fin_tx",[]); save("fin_debts",[]); save("fin_goals",[]);
    closeModal(); render(); renderTicker();
    showToast("Datos eliminados","err");
  }
}

function pickEmoji(e){
  modalData.emoji=e;
  document.querySelectorAll(".emoji-opt").forEach(el=>el.classList.toggle("selected",el.dataset.e===e));
  document.getElementById("mg-emoji-display").textContent=e;
}

function setView(v){
  currentView=v;
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  const nb=document.getElementById("nav-"+v);
  if(nb) nb.classList.add("active");
  document.getElementById("content").scrollTop=0;
  render();
}

// STATS
function getMonthlyStats(){
  const now=new Date();
  const months=[];
  for(let i=2;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    const key=d.toISOString().slice(0,7);
    const mTx=transactions.filter(t=>t.fecha.startsWith(key));
    const inc=mTx.filter(t=>t.tipo==="ingreso").reduce((s,t)=>s+t.monto,0);
    const exp=mTx.filter(t=>t.tipo==="gasto").reduce((s,t)=>s+t.monto,0);
    months.push({key,inc,exp,balance:inc-exp});
  }
  return months;
}
function getForecast(){
  const stats=getMonthlyStats();
  const realMonths=stats.filter(m=>m.inc>0||m.exp>0);
  if(!realMonths.length) return null;
  const avgInc=realMonths.reduce((s,m)=>s+m.inc,0)/realMonths.length;
  const avgExp=realMonths.reduce((s,m)=>s+m.exp,0)/realMonths.length;
  const avgSave=avgInc-avgExp;
  const now=new Date();
  const forecast=[];
  let cumulative=0;
  for(let i=0;i<6;i++){ cumulative+=avgSave; forecast.push({month:monthLabel(i+1),projected:cumulative,monthly:avgSave}); }
  return {forecast,avgInc,avgExp,avgSave};
}

// ── RENDER ────────────────────────────────────────────────
function render(){
  const month=monthInput.value;
  const filtered=transactions.filter(t=>t.fecha.startsWith(month));
  const totalIn=filtered.filter(t=>t.tipo==="ingreso").reduce((s,t)=>s+t.monto,0);
  const totalOut=filtered.filter(t=>t.tipo==="gasto").reduce((s,t)=>s+t.monto,0);
  const totalDebtCalc=debts.filter(d=>d.paid>0).reduce((s,d)=>s+(d.total-d.paid),0);
  const balance=totalIn-totalOut-totalDebtCalc;
  const el=document.getElementById("content");
  if(currentView==="dashboard") renderDashboard(el,filtered,totalIn,totalOut,balance,totalDebtCalc);
  else if(currentView==="add") renderAdd(el);
  else if(currentView==="savings") renderSavings(el);
  else if(currentView==="debts") renderDebts(el);
  else renderHistory(el,filtered);
}

              </div>

// ── DEBTS VIEW ────────────────────────────────────────────
function renderDebts(el){
  const pending=debts.filter(d=>d.paid<d.total);
  const paid=debts.filter(d=>d.paid>=d.total);
  const totalPending=pending.reduce((s,d)=>s+(d.total-d.paid),0);
  const totalPaid=paid.reduce((s,d)=>s+d.total,0);
  const overdueCount=pending.filter(d=>d.vencimiento&&d.vencimiento<todayStr()).length;

  let html=`
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
    <div style="font-size:15px;font-weight:700">Mis deudas</div>
    <button onclick="openAddDebtModal()" style="background:linear-gradient(135deg,#f97316,#ef4444);color:#fff;border-radius:10px;padding:8px 14px;font-size:13px;font-weight:700">+ Nueva deuda</button>
  </div>

  <div class="debt-summary">
    <div class="debt-stat" style="animation-delay:0s">
      <div class="debt-stat-label">Por pagar</div>
      <div class="debt-stat-val" style="color:${totalPending>0?"#fb923c":"#4ade80"}">${fmt(totalPending)}</div>
      <div style="font-size:11px;color:#555;margin-top:3px">${pending.length} deuda${pending.length!==1?"s":""}</div>
    </div>
    <div class="debt-stat" style="animation-delay:.05s">
      <div class="debt-stat-label">Pagadas</div>
      <div class="debt-stat-val" style="color:#4ade80">${fmt(totalPaid)}</div>
      <div style="font-size:11px;color:#555;margin-top:3px">${paid.length} deuda${paid.length!==1?"s":""}</div>
    </div>
    ${overdueCount>0?`<div class="debt-stat" style="animation-delay:.08s;border-color:#4a1a1a;background:#1a0a0a">
      <div class="debt-stat-label" style="color:#f87171">Vencidas</div>
      <div class="debt-stat-val" style="color:#f87171">${overdueCount}</div>
      <div style="font-size:11px;color:#555;margin-top:3px">deuda${overdueCount!==1?"s":""}</div>
    </div>`:""}
  </div>`;

  if(debts.length===0){
    html+=`<div class="card"><div class="empty"><div class="empty-icon">💳</div>Sin deudas registradas.<br><button onclick="openAddDebtModal()" style="margin-top:14px;background:#2a1a0a;border:1px solid #4a3020;color:#fb923c;border-radius:9px;padding:9px 18px;font-size:13px;font-weight:600;">Agregar primera deuda</button></div></div>`;
  } else {
    // Pending debts
    if(pending.length>0){
      html+=`<div class="section-label" style="margin-top:4px;margin-bottom:8px">POR PAGAR</div>`;
      pending.sort((a,b)=>{
        const aOver=a.vencimiento&&a.vencimiento<todayStr();
        const bOver=b.vencimiento&&b.vencimiento<todayStr();
        if(aOver&&!bOver) return -1;
        if(!aOver&&bOver) return 1;
        return (a.vencimiento||"9")<(b.vencimiento||"9")?-1:1;
      }).forEach((d,i)=>{
        const remain=d.total-d.paid;
        const pct=Math.round((d.paid/d.total)*100);
        const overdue=d.vencimiento&&d.vencimiento<todayStr();
        const duesSoon=d.vencimiento&&!overdue&&d.vencimiento<=new Date(Date.now()+7*864e5).toISOString().slice(0,10);
        html+=`<div class="debt-card" style="animation-delay:${i*.05}s;background:${overdue?"linear-gradient(135deg,#1a0808,#140a0a)":"#16161e"};border:1px solid ${overdue?"#4a1a1a":duesSoon?"#4a3010":"#2a2a3a"}">
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">

              ${overdue?`<span style="font-size:10px;background:rgba(248,113,113,.15);color:#f87171;padding:2px 7px;border-radius:5px;flex-shrink:0">VENCIDA</span>`:duesSoon?`<span style="font-size:10px;background:rgba(251,146,60,.15);color:#fb923c;padding:2px 7px;border-radius:5px;flex-shrink:0">PRÓXIMA</span>`:""}
            </div>
            <div style="height:5px;border-radius:5px;background:#1e1e2e;margin-bottom:6px;overflow:hidden">
              <div style="height:100%;border-radius:5px;width:${pct}%;background:${overdue?"linear-gradient(90deg,#f87171,#ef4444)":"linear-gradient(90deg,#fb923c,#f97316)"};transition:width .5s"></div>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:11px;color:#555">
              <span>Pagado ${fmt(d.paid)} (${pct}%)</span>
              <span>${d.vencimiento?fmtDate(d.vencimiento):d.categoria||"General"}</span>
            </div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0;margin-left:12px">
            <div style="text-align:right">
              <div style="font-family:'DM Mono',monospace;font-weight:700;font-size:17px;color:${overdue?"#f87171":"#fb923c"}">-${fmt(remain)}</div>
              <div style="font-size:11px;color:#555">de ${fmt(d.total)}</div>
            </div>
            <div style="display:flex;gap:6px">
              <button onclick="openPayDebtModal(${d.id})" style="background:linear-gradient(135deg,#f97316,#ef4444);color:#fff;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700">Pagar</button>

            </div>
          </div>
        </div>`;
      });
    }

    // Paid debts
    if(paid.length>0){
      html+=`<div class="section-label" style="margin-top:16px;margin-bottom:8px">PAGADAS ✓</div>`;
      paid.forEach((d,i)=>{
        html+=`<div class="debt-card" style="animation-delay:${i*.04}s;background:#0d160d;border:1px solid #1a3020;opacity:.7">
          <div style="flex:1;min-width:0">
            <div class="debt-name" style="color:#4ade80;text-decoration:line-through;text-decoration-color:#2a5a2a">${esc(d.name)}</div>
            <div style="font-size:12px;color:#3a6a3a;margin-top:3px">${d.categoria||"General"}</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
            <div style="font-family:'DM Mono',monospace;font-size:15px;color:#4ade80">${fmt(d.total)}</div>
            <div style="width:24px;height:24px;border-radius:50%;background:#1a4030;border:2px solid #4ade80;display:flex;align-items:center;justify-content:center;font-size:12px">✓</div>
            <button onclick="askDeleteDebt(${d.id})" style="background:none;color:#333;font-size:16px">✕</button>
          </div>
        </div>`;
      });
    }
  }

  el.innerHTML=html;
}

function openAddDebtModal(){

// ── TICKER & REMINDERS ────────────────────────────────────
let reminderOn = load("fin_reminder", false);
let reminderChecked = load("fin_reminder_date", "");

function buildTickerText() {
  const pending = debts.filter(d => d.paid < d.total);
  if (!pending.length) return null;

  const today = todayStr();
  const overdue = pending.filter(d => d.vencimiento && d.vencimiento < today);
  const upcoming = pending.filter(d => d.vencimiento && d.vencimiento >= today && d.vencimiento <= new Date(Date.now()+7*864e5).toISOString().slice(0,10));
  const totalPending = pending.reduce((s,d) => s + (d.total - d.paid), 0);

  let items = [];
  if (overdue.length) items.push({ text:`⚠ ${overdue.length} deuda${overdue.length>1?"s":""} VENCIDA${overdue.length>1?"S":""}`, color:"#f87171", dot:"#f87171" });
  if (upcoming.length) upcoming.forEach(d => items.push({ text:`📅 ${d.name} vence ${fmtDate(d.vencimiento)}`, color:"#fb923c", dot:"#fb923c" }));
  pending.filter(d=>!d.vencimiento||(d.vencimiento>=today)).forEach(d => {
    const remain = d.total - d.paid;
    items.push({ text:`💳 ${d.name}: -${fmt(remain)}`, color: d.vencimiento&&d.vencimiento<today?"#f87171":"#fb923c", dot: d.vencimiento&&d.vencimiento<today?"#f87171":"#fb923c" });
  });
  items.push({ text:`📊 Total pendiente: ${fmt(totalPending)}`, color:"#a78bfa", dot:"#6366f1" });
  return { items, urgent: overdue.length > 0 };
}

function renderTicker() {
  const wrap = document.getElementById("ticker-wrap");
  const track = document.getElementById("ticker-track");
  const bell = document.getElementById("ticker-bell");

  bell.className = "ticker-bell " + (reminderOn ? "on" : "off");
  bell.title = reminderOn ? "Recordatorio activo — toca para desactivar" : "Activar recordatorio diario";

  const pending = debts.filter(d => d.paid < d.total);
  if (!pending.length) { wrap.classList.remove("visible","urgent"); return; }

  const data = buildTickerText();
  if (!data) { wrap.classList.remove("visible","urgent"); return; }

  wrap.classList.toggle("urgent", data.urgent);
  wrap.classList.add("visible");

  // Build doubled content for seamless loop
  const makeItems = () => data.items.map(item =>
    `<span class="ticker-item" style="color:${item.color}">
      <span class="ticker-dot" style="background:${item.dot}"></span>
      ${item.text}
      <span class="ticker-sep">·</span>
    </span>`
  ).join("");

  track.innerHTML = makeItems() + makeItems(); // doubled for seamless loop

  // Adjust animation speed based on content length
  const speed = Math.max(18, data.items.length * 7);
  track.style.animationDuration = speed + "s";
}

function toggleReminder() {
  reminderOn = !reminderOn;
  save("fin_reminder", reminderOn);

  if (reminderOn) {
    requestNotificationPermission();
    showToast("🔔 Recordatorio diario activado");
  } else {
    showToast("Recordatorio desactivado", "err");
  }
  renderTicker();
}

function requestNotificationPermission() {
  if (!("Notification" in window)) return;
  if (Notification.permission === "default") {
    Notification.requestPermission().then(perm => {
      if (perm === "granted") scheduleReminder();
    });
  } else if (Notification.permission === "granted") {
    scheduleReminder();
  }
}

function scheduleReminder() {
  // Fire immediately if first time today
  const today = todayStr();
  if (reminderChecked !== today && reminderOn) {
    save("fin_reminder_date", today);
    reminderChecked = today;
    setTimeout(fireReminder, 3000); // 3 seconds after enabling
  }
}

function fireReminder() {
  if (!reminderOn) return;
  const pending = debts.filter(d => d.paid < d.total);
  if (!pending.length) return;
  const totalPending = pending.reduce((s,d) => s+(d.total-d.paid), 0);
  const overdue = pending.filter(d => d.vencimiento && d.vencimiento < todayStr());

  if ("Notification" in window && Notification.permission === "granted") {
    new Notification("💳 Recordatorio de deudas", {
      body: `${pending.length} deuda${pending.length>1?"s":""} pendiente${pending.length>1?"s":""}. Total: ${fmt(totalPending)}` + (overdue.length ? ` · ⚠ ${overdue.length} vencida${overdue.length>1?"s":""}` : ""),
      icon: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230a0a0f'/%3E%3Ctext x='50' y='62' text-anchor='middle' font-size='50'%3E💳%3C/text%3E%3C/svg%3E",
      badge: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%23f97316'/%3E%3C/svg%3E",
      tag: "finanzas-deudas",
      requireInteraction: false
    });
  }
}

// Check reminder once per session
function checkDailyReminder() {
  if (!reminderOn) return;
  const today = todayStr();
  if (reminderChecked !== today) {
    save("fin_reminder_date", today);
    reminderChecked = today;
    if ("Notification" in window && Notification.permission === "granted") {
      setTimeout(fireReminder, 2000);
    }
  }
}

// ── EXPORT EXCEL ──────────────────────────────────────────
function exportExcel(){
  if(typeof XLSX === "undefined"){ showToast("Error: librería no cargada","err"); return; }
  const wb = XLSX.utils.book_new();

  // Sheet 1: Transacciones
  const txData = [["ID","Tipo","Descripción","Monto","Categoría","Fecha"]];
  transactions.forEach(t => txData.push([t.id, t.tipo, t.descripcion, t.monto, t.categoria, t.fecha]));
  const wsTx = XLSX.utils.aoa_to_sheet(txData);
  wsTx['!cols'] = [{wch:14},{wch:10},{wch:30},{wch:12},{wch:18},{wch:12}];
  XLSX.utils.book_append_sheet(wb, wsTx, "Transacciones");

  // Sheet 2: Deudas
  const debtData = [["ID","Nombre","Total","Pagado","Pendiente","Vencimiento","Categoría","Estado"]];
  debts.forEach(d => debtData.push([
    d.id, d.name, d.total, d.paid, d.total-d.paid,
    d.vencimiento||"", d.categoria||"General",
    d.paid>=d.total?"Pagada":(d.vencimiento&&d.vencimiento<todayStr()?"Vencida":"Pendiente")
  ]));
  const wsDebts = XLSX.utils.aoa_to_sheet(debtData);
  wsDebts['!cols'] = [{wch:14},{wch:25},{wch:12},{wch:12},{wch:12},{wch:14},{wch:18},{wch:10}];
  XLSX.utils.book_append_sheet(wb, wsDebts, "Deudas");

  // Sheet 3: Pagos de deudas
  const pagosData = [["ID Deuda","Nombre Deuda","Fecha Pago","Monto Pago"]];
  debts.forEach(d => (d.pagos||[]).forEach(p => pagosData.push([d.id, d.name, p.date, p.amount])));
  const wsPagos = XLSX.utils.aoa_to_sheet(pagosData);
  wsPagos['!cols'] = [{wch:14},{wch:25},{wch:14},{wch:12}];
  XLSX.utils.book_append_sheet(wb, wsPagos, "Pagos Deudas");

  // Sheet 4: Metas de ahorro
  const goalsData = [["ID","Nombre","Emoji","Meta","Ahorrado","Pendiente","% Completado"]];
  goals.forEach(g => goalsData.push([

function importFromWorkbook(wb){
  const result = { transactions:[], debts:[], goals:[] };
  if(wb.SheetNames.includes("Transacciones")){
    const rows = XLSX.utils.sheet_to_json(wb.Sheets["Transacciones"]);
    result.transactions = rows.map(r=>({
      id: r["ID"]||Date.now()+Math.random(),
      tipo: r["Tipo"]||"gasto",
      descripcion: r["Descripción"]||r["Descripcion"]||"",
      monto: parseFloat(r["Monto"])||0,
      categoria: r["Categoría"]||r["Categoria"]||"Otro gasto",
      fecha: r["Fecha"]?String(r["Fecha"]).slice(0,10):todayStr()
    })).filter(t=>t.descripcion&&t.monto>0);
  }
  if(wb.SheetNames.includes("Deudas")){
    const rows = XLSX.utils.sheet_to_json(wb.Sheets["Deudas"]);
    result.debts = rows.map(r=>({
      id: r["ID"]||Date.now()+Math.random(),
      name: r["Nombre"]||"",
      total: parseFloat(r["Total"])||0,
      paid: parseFloat(r["Pagado"])||0,
      vencimiento: r["Vencimiento"]?String(r["Vencimiento"]).slice(0,10):"",
      categoria: r["Categoría"]||r["Categoria"]||"General",
      pagos:[]
    })).filter(d=>d.name&&d.total>0);
  }
  if(wb.SheetNames.includes("Metas Ahorro")){
    const rows = XLSX.utils.sheet_to_json(wb.Sheets["Metas Ahorro"]);
    result.goals = rows.map(r=>({
      id: r["ID"]||Date.now()+Math.random(),
      name: r["Nombre"]||"",
      emoji: r["Emoji"]||"💰",
      target: parseFloat(r["Meta"])||0,
      saved: parseFloat(r["Ahorrado"])||0,
      deposits:[]
    })).filter(g=>g.name&&g.target>0);
  }
  return result;
}

// ── EXPORT EXCEL ──────────────────────────────────────────
function exportExcel(){
  if(typeof XLSX === "undefined"){ showToast("Error: librería no cargada","err"); return; }
  const wb = XLSX.utils.book_new();

  // Sheet 1: Transacciones
  const txData = [
    ["ID","Tipo","Descripción","Monto","Categoría","Fecha"]
  ];
  transactions.forEach(t => txData.push([t.id, t.tipo, t.descripcion, t.monto, t.categoria, t.fecha]));
  const wsTx = XLSX.utils.aoa_to_sheet(txData);
  wsTx['!cols'] = [{wch:14},{wch:10},{wch:30},{wch:12},{wch:18},{wch:12}];
  XLSX.utils.book_append_sheet(wb, wsTx, "Transacciones");

  // Sheet 2: Deudas
  const debtData = [
    ["ID","Nombre","Total","Pagado","Pendiente","Vencimiento","Categoría","Estado"]
  ];
  debts.forEach(d => debtData.push([
    d.id, d.name, d.total, d.paid, d.total - d.paid,
    d.vencimiento||"", d.categoria||"General",
    d.paid >= d.total ? "Pagada" : (d.vencimiento && d.vencimiento < todayStr() ? "Vencida" : "Pendiente")
  ]));
  const wsDebts = XLSX.utils.aoa_to_sheet(debtData);
  wsDebts['!cols'] = [{wch:14},{wch:25},{wch:12},{wch:12},{wch:12},{wch:14},{wch:18},{wch:10}];
  XLSX.utils.book_append_sheet(wb, wsDebts, "Deudas");

  // Sheet 3: Pagos de deudas
  const pagosData = [["ID Deuda","Nombre Deuda","Fecha Pago","Monto Pago"]];
  debts.forEach(d => (d.pagos||[]).forEach(p => pagosData.push([d.id, d.name, p.date, p.amount])));
  const wsPagos = XLSX.utils.aoa_to_sheet(pagosData);
  wsPagos['!cols'] = [{wch:14},{wch:25},{wch:14},{wch:12}];
  XLSX.utils.book_append_sheet(wb, wsPagos, "Pagos Deudas");

  // Sheet 4: Metas de ahorro
  const goalsData = [["ID","Nombre","Emoji","Meta","Ahorrado","Pendiente","% Completado"]];
  goals.forEach(g => goalsData.push([
    g.id, g.name, g.emoji, g.target, g.saved||0,
    Math.max(g.target-(g.saved||0),0),
    Math.min(Math.round(((g.saved||0)/g.target)*100),100)+"%"
  ]));
  const wsGoals = XLSX.utils.aoa_to_sheet(goalsData);
  wsGoals['!cols'] = [{wch:14},{wch:25},{wch:7},{wch:12},{wch:12},{wch:12},{wch:14}];
  XLSX.utils.book_append_sheet(wb, wsGoals, "Metas Ahorro");

  // Sheet 5: Depósitos de metas
  const depsData = [["ID Meta","Nombre Meta","Fecha","Monto","Tipo"]];
  goals.forEach(g => (g.deposits||[]).forEach(d => depsData.push([
    g.id, g.name, d.date, Math.abs(d.amount), d.amount >= 0 ? "Depósito" : "Retiro"
  ])));
  const wsDeps = XLSX.utils.aoa_to_sheet(depsData);
  wsDeps['!cols'] = [{wch:14},{wch:25},{wch:14},{wch:12},{wch:10}];
  XLSX.utils.book_append_sheet(wb, wsDeps, "Depósitos Metas");

  const fecha = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `finanzas_${fecha}.xlsx`);
