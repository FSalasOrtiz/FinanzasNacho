<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Finanzas</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Finanzas" />
  <meta name="theme-color" content="#0a0a0f" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;500;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;overflow:hidden}
    body{font-family:'DM Sans',sans-serif;background:#0a0a0f;color:#f0f0f5;height:100vh;display:flex;flex-direction:column;overflow:hidden}
    input,select,button,textarea{font-family:inherit;outline:none;border:none;-webkit-appearance:none}
    button{cursor:pointer}
    ::-webkit-scrollbar{display:none}
    #header{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:rgba(10,10,15,.97);border-bottom:1px solid #1a1a2a;z-index:50;gap:10px}
    .logo{display:flex;align-items:center;gap:9px}
    .logo-icon{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,#6ee7b7,#3b82f6);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;color:#fff}
    .logo-text{font-weight:700;font-size:17px}
    .header-right{display:flex;align-items:center;gap:8px}
    #month-input{background:#16161e;border:1px solid #2a2a3a;color:#aaa;border-radius:8px;padding:5px 8px;font-size:12px}
    .hbtn{background:none;color:#555;font-size:15px;padding:5px 7px;border-radius:8px;transition:all .15s;line-height:1;border:none;cursor:pointer}
    .hbtn.active{color:#a78bfa;background:rgba(167,139,250,.12)}
    #content{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 20px}
    #nav{flex-shrink:0;display:flex;background:rgba(14,14,20,.98);border-top:1px solid #1a1a2a;padding-bottom:2px}
    .nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:7px 2px;background:none;color:#555;font-size:9px;letter-spacing:.03em;font-weight:600;transition:color .15s;border:none;cursor:pointer}
    .nav-btn.active{color:#a78bfa}
    .nav-btn svg{width:20px;height:20px}
    .nav-add-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:5px 2px;background:none;border:none;cursor:pointer}
    .nav-add-inner{width:42px;height:42px;border-radius:13px;background:linear-gradient(135deg,#a78bfa,#6366f1);display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;box-shadow:0 4px 18px rgba(99,102,241,.4);transition:transform .15s}
    .nav-add-btn:active .nav-add-inner{transform:scale(.92)}
    .card{background:#16161e;border:1px solid #2a2a3a;border-radius:16px;padding:18px;margin-bottom:12px}
    .slabel{font-size:11px;color:#555;letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px;font-weight:600}
    .form-label{font-size:11px;color:#666;letter-spacing:.06em;text-transform:uppercase;display:block;margin-bottom:8px;font-weight:600}
    .form-input{width:100%;background:#0a0a0f;border:1px solid #2a2a3a;border-radius:12px;padding:12px 14px;color:#f0f0f5;font-size:16px}
    .form-input:focus{border-color:#4c3d9a}
    select.form-input{color:#ccc}
    #modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:flex-end;justify-content:center}
    #modal-overlay.show{display:flex}
    #modal-box{background:#16161e;border:1px solid #2a2a3a;border-radius:20px 20px 0 0;padding:22px 20px;max-width:460px;width:100%;max-height:90vh;overflow-y:auto}
    @media(min-width:500px){#modal-overlay{align-items:center}#modal-box{border-radius:20px;max-width:380px}}
    .modal-title{font-size:17px;font-weight:700;margin-bottom:16px}
    .modal-btns{display:flex;gap:10px;margin-top:18px}
    .modal-cancel{flex:1;padding:11px;border-radius:10px;background:#222;color:#888;font-size:15px;border:none;cursor:pointer}
    .modal-confirm{flex:1;padding:11px;border-radius:10px;font-size:15px;font-weight:700;color:#fff;border:none;cursor:pointer}
    .modal-confirm.danger{background:#7f2020}
    .modal-confirm.primary{background:linear-gradient(135deg,#6366f1,#a78bfa)}
    #toast{display:none;position:fixed;bottom:80px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:10px;font-size:14px;font-weight:500;box-shadow:0 8px 28px rgba(0,0,0,.5);z-index:300;white-space:nowrap}
    #toast.show{display:block}
    #toast.ok{background:#0d2d1a;border:1px solid #1a5c35;color:#4ade80}
    #toast.err{background:#3d1414;border:1px solid #7f2020;color:#ff8080}
    #toast.info{background:#0d1a2d;border:1px solid #1a3a6a;color:#60a5fa}
    #ticker-wrap{flex-shrink:0;overflow:hidden;background:#0f0a1a;border-bottom:1px solid #2a1a4a;height:0;transition:height .3s;display:flex;align-items:center}
    #ticker-wrap.visible{height:28px}
    #ticker-wrap.urgent{background:#1a0808;border-bottom-color:#4a1a1a}
    #ticker-track{display:flex;white-space:nowrap;animation:tickerScroll 28s linear infinite}
    @keyframes tickerScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
    #ticker-bell{flex-shrink:0;padding:0 10px;font-size:14px;cursor:pointer;border-left:1px solid #2a1a4a;height:100%;display:flex;align-items:center;background:none;border-top:none;border-right:none;border-bottom:none}
    #ticker-bell.on{color:#a78bfa}
    #ticker-bell.off{color:#444}
    #data-panel{flex-shrink:0;display:none;background:#0d0d16;border-bottom:1px solid #1a1a2a;padding:10px 14px;gap:7px;flex-wrap:wrap}
    #data-panel.show{display:flex}
    .data-btn{flex:1;min-width:110px;display:flex;align-items:center;justify-content:center;gap:5px;padding:8px 10px;border-radius:10px;font-size:12px;font-weight:700;transition:all .15s;border:1px solid;cursor:pointer}
    .data-btn:active{transform:scale(.96)}
    .dbtn-exp{background:rgba(99,102,241,.15);color:#a78bfa;border-color:#3a3a6a}
    .dbtn-imp{background:rgba(56,189,248,.12);color:#38bdf8;border-color:#1a3a5a}
    .dbtn-bak{background:rgba(74,222,128,.1);color:#4ade80;border-color:#1a4030}
    .dbtn-del{background:rgba(248,113,113,.1);color:#f87171;border-color:#5c1a1a}
    #file-import-input{display:none}
    #search-bar{display:none;background:#0d0d16;border-bottom:1px solid #1a1a2a;padding:8px 14px}
    #search-bar.show{display:block}
    #search-input{width:100%;background:#16161e;border:1px solid #2a2a3a;border-radius:10px;padding:9px 14px;color:#f0f0f5;font-size:14px}
  </style>
</head>
<body>
<div id="header">
  <div class="logo">
    <div class="logo-icon">F</div>
    <span class="logo-text">Finanzas</span>
  </div>
  <div class="header-right">
    <input type="month" id="month-input" />
    <button class="hbtn" id="btn-search" onclick="toggleSearch()" title="Buscar">&#128269;</button>
    <button class="hbtn" id="btn-data" onclick="toggleDataPanel()" title="Datos">&#9881;</button>
  </div>
</div>
<div id="search-bar">
  <input type="search" id="search-input" placeholder="Buscar transacciones..." oninput="onSearch(this.value)" autocomplete="off" />
</div>
<div id="ticker-wrap">
  <div id="ticker-track"></div>
  <button id="ticker-bell" onclick="toggleReminder()">&#128276;</button>
</div>
<div id="data-panel">
  <button class="data-btn dbtn-exp" onclick="exportExcel()">&#8595; Exportar .xlsx</button>
  <button class="data-btn dbtn-imp" onclick="document.getElementById('file-import-input').click()">&#8593; Importar</button>
  <button class="data-btn dbtn-bak" onclick="exportJSON()">&#128737; Backup</button>
  <button class="data-btn dbtn-del" onclick="confirmClearData()">&#128465; Borrar todo</button>
</div>
<input type="file" id="file-import-input" accept=".xlsx,.xls,.json" onchange="handleImportFile(event)" />
<div id="content"></div>
<nav id="nav">
  <button class="nav-btn active" id="nav-dashboard" onclick="setView('dashboard')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    Inicio
  </button>
  <button class="nav-btn" id="nav-analysis" onclick="setView('analysis')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    Análisis
  </button>
  <button class="nav-add-btn" onclick="setView('add')">
    <div class="nav-add-inner">+</div>
  </button>
  <button class="nav-btn" id="nav-debts" onclick="setView('debts')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>
    Deudas
  </button>
  <button class="nav-btn" id="nav-savings" onclick="setView('savings')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C8 2 4 5 4 9c0 2.4 1.2 4.5 3 5.7V17a1 1 0 001 1h8a1 1 0 001-1v-2.3c1.8-1.2 3-3.3 3-5.7 0-4-4-7-8-7z"/><path d="M9 21h6"/></svg>
    Ahorro
  </button>
</nav>
<div id="modal-overlay" onclick="closeModal()">
  <div id="modal-box" onclick="event.stopPropagation()">
    <div class="modal-title" id="modal-title"></div>
    <div id="modal-body"></div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">Cancelar</button>
      <button class="modal-confirm primary" id="modal-confirm-btn" onclick="modalConfirm()">Confirmar</button>
    </div>
  </div>
</div>
<div id="toast"></div>
<script src="app.js"></script>
</body>
</html>
